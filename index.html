<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonífica | Simulador de Ciclos Reais</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ff88; --dark: #080808; --card: #121212;
            --gold: #ffcc00; --text: #ffffff; --danger: #ff3366;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 900; color: var(--gold); text-transform: uppercase; }
        
        .config-panel {
            max-width: 800px; margin: 0 auto 30px; background: var(--card);
            padding: 20px; border-radius: 15px; border: 1px solid #333;
            display: flex; gap: 20px; justify-content: center;
        }
        .config-group input { 
            background: #000; border: 1px solid var(--gold); padding: 10px; border-radius: 8px;
            font-size: 20px; font-weight: 900; color: var(--primary); width: 100px; text-align: center;
        }

        .career-path { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .level-card {
            background: var(--card); border-radius: 20px; padding: 25px;
            display: grid; grid-template-columns: 160px 1fr 250px;
            align-items: center; gap: 20px; border: 1px solid #222;
            position: relative; overflow: hidden;
        }

        /* Cores dos Ciclos para diferenciar visualmente */
        .ciclo-impar { border-left: 5px solid #555; }
        .ciclo-par { border-left: 5px solid var(--danger); background: #161616; }

        .rank-info { text-align: center; border-right: 1px solid #333; }
        .month-num { font-size: 38px; font-weight: 900; color: #fff; display: block; }
        .cycle-tag { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .tag-abertura { background: #444; color: #ccc; }
        .tag-fechamento { background: var(--danger); color: #fff; }

        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; }
        .data-label { font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; }
        .data-value { font-size: 14px; font-weight: 700; color: #eee; }
        
        .pin-result { font-weight: 900; color: var(--gold); font-size: 16px; }
        .income-box { background: #000; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .income-total { font-size: 24px; font-weight: 900; color: var(--primary); display: block; }

        .bonus-3d-alert {
            position: absolute; top: 10px; right: -30px; background: var(--danger);
            color: #fff; font-size: 10px; font-weight: 900; padding: 5px 40px;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Dashboard Bonífica | Ciclos de 60 Dias</h1>
    <p style="font-size: 12px; color: #888;">REGRA: No 2º mês do ciclo o bônus 3D ajuda no PIN. No 3º mês o bônus ZERA.</p>
</div>

<div class="config-panel" id="controls">
    <div class="config-group">
        <label style="color:var(--gold); display:block; font-size:10px; margin-bottom:5px;">REDE (Nº NOVOS)</label>
        <input type="number" id="inp_n" value="5" oninput="run()">
    </div>
    <div class="config-group">
        <label style="color:var(--gold); display:block; font-size:10px; margin-bottom:5px;">CONSUMO (R$)</label>
        <input type="number" id="inp_v" value="300" oninput="run()">
    </div>
</div>

<div class="career-path" id="dashboard"></div>

<script>
function run() {
    const n = parseInt(document.getElementById('inp_n').value) || 0;
    const v = parseFloat(document.getElementById('inp_v').value) || 0;
    const container = document.getElementById('dashboard');
    
    let html = '';
    let redeTotal = 0;
    let ptsMesAnterior = 0;

    const tiers = [
        { pts: 950, pin: 100, vme: 0.5 },
        { pts: 2450, pin: 200, vme: 0.5 },
        { pts: 7250, pin: 700, vme: 0.4 },
        { pts: 14750, pin: 1300, vme: 0.4 },
        { pts: 27500, pin: 4000, vme: 0.4 },
        { pts: 60000, pin: 12000, vme: 0.4 },
        { pts: 122500, pin: 24000, vme: 0.4 },
        { pts: 247500, pin: 34000, vme: 0.35 },
        { pts: 495000, pin: 60000, vme: 0.3 },
        { pts: 1475000, pin: 130000, vme: 0.3 },
        { pts: 3000000, pin: 250000, vme: 0.3 }
    ];

    for (let mes = 1; mes <= 12; mes++) {
        // Crescimento da rede - Simulação Mês a Mês
        redeTotal += Math.pow(n, mes);
        let ptsMensalReal = (redeTotal * v) / 3;
        
        // IDENTIFICAÇÃO DO CICLO
        let isFechamentoCiclo = (mes % 2 === 0);
        let bonus30D = 0;

        // REGRA DO BÔNUS 3D: Apenas no fechamento do ciclo e se houver crescimento
        if (isFechamentoCiclo) {
            if (ptsMensalReal > ptsMesAnterior && ptsMensalReal <= 27500) {
                bonus30D = ptsMesAnterior; 
            }
        }

        // PONTUAÇÃO DE CARREIRA (Soma o bônus apenas para atingir o PIN do mês)
        let ptsCarreiraParaPIN = ptsMensalReal + bonus30D;

        // UNILEVEL (Sempre sobre a produção REAL do mês)
        let unilevelBRL = 0;
        for (let g = 1; g <= mes; g++) {
            let volGen = Math.pow(n, g) * v;
            let p = (g === 1 || g === 2) ? 0.05 : (g === 3 ? 0.09 : 0.04);
            unilevelBRL += volGen * p;
        }

        // CÁLCULO DO PIN ATINGIDO
        let currentPinVal = 0;
        let pinName = 0;
        let ptsPorLinha = ptsCarreiraParaPIN / n;

        for (let t of tiers) {
            let ptsValidos = n * Math.min(ptsPorLinha, t.pts * t.vme);
            if (ptsValidos >= t.pts) {
                currentPinVal = t.pin;
                pinName = t.pts;
            }
        }

        html += `
            <div class="level-card ${isFechamentoCiclo ? 'ciclo-par' : 'ciclo-impar'}">
                ${bonus30D > 0 ? '<div class="bonus-3d-alert">BÔNUS 3D</div>' : ''}
                
                <div class="rank-info">
                    <span class="month-num">${mes}º</span>
                    <span class="cycle-tag ${isFechamentoCiclo ? 'tag-fechamento' : 'tag-abertura'}">
                        ${isFechamentoCiclo ? 'Fechamento Ciclo' : 'Início Ciclo'}
                    </span>
                    <div style="margin-top:10px">
                        <span class="pin-result">${pinName > 0 ? 'PIN ' + pinName.toLocaleString() : 'SEM PIN'}</span>
                    </div>
                </div>
                
                <div class="data-grid">
                    <div class="data-item"><span class="data-label">Produção Real</span><span class="data-value">${Math.floor(ptsMensalReal).toLocaleString()} pts</span></div>
                    <div class="data-item"><span class="data-label">Ajuda 30D</span><span class="data-value" style="color:${bonus30D > 0 ? 'var(--danger)' : '#444'}">+ ${Math.floor(bonus30D).toLocaleString()} pts</span></div>
                    <div class="data-item"><span class="data-label">Residual Unilevel</span><span class="data-value">R$ ${unilevelBRL.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                    <div class="data-item"><span class="data-label">Bônus PIN</span><span class="data-value" style="color:var(--gold)">R$ ${currentPinVal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                </div>

                <div class="income-box">
                    <span class="data-label" style="color:var(--primary)">GANHO NO MÊS</span>
                    <span class="income-total">R$ ${(unilevelBRL + currentPinVal).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>`;
        
        ptsMesAnterior = ptsMensalReal; // Prepara para comparar no próximo mês
    }
    container.innerHTML = html;
}
run();
</script>
</body>
</html>
