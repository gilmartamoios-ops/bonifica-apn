<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sociedade de Consumo e Renda Bonífica | Dashboard Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a859; --dark: #0f0f0f; --card-bg: #1a1a1a;
            --gold: #d4af37; --text: #ffffff; --danger: #ff4d4d;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-weight: 900; font-size: 2.2rem; color: var(--gold); margin: 0; text-transform: uppercase; }
        .header p { opacity: 0.7; letter-spacing: 2px; font-size: 0.9rem; }

        .config-panel {
            max-width: 1000px; margin: 0 auto 50px; background: var(--card-bg);
            padding: 30px; border-radius: 20px; border: 1px solid #333;
            display: flex; gap: 30px; justify-content: center; align-items: center;
        }
        .input-group { text-align: center; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 10px; }
        .input-group input { 
            background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 12px;
            font-size: 28px; font-weight: 900; color: var(--primary); width: 160px; text-align: center;
        }

        .career-path { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        
        .level-card {
            background: var(--card-bg); border-radius: 25px; padding: 35px;
            display: grid; grid-template-columns: 180px 1fr 250px;
            align-items: center; gap: 30px; border: 1px solid #222;
            transition: all 0.4s; position: relative;
        }
        .level-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .rank-info { text-align: center; border-right: 1px solid #333; }
        .rank-info .month { font-size: 48px; font-weight: 900; color: var(--gold); display: block; }
        .rank-title { 
            background: var(--gold); color: #000; padding: 6px 15px; border-radius: 50px;
            font-size: 13px; font-weight: 900; display: inline-block; margin-top: 10px;
            min-width: 140px;
        }

        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 20px; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .data-value { font-size: 15px; font-weight: 700; color: #fff; }
        
        .vme-alert { color: var(--danger); font-size: 12px; font-weight: 900; }
        .vme-ok { color: var(--primary); font-size: 12px; font-weight: 900; }

        .income-result { 
            background: #000; padding: 25px; border-radius: 20px; text-align: center;
            border: 1px solid #333;
        }
        .income-label { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .income-value { font-size: 30px; font-weight: 900; color: var(--primary); display: block; margin-top: 5px; }

        .acelerador-badge {
            position: absolute; top: 0; right: 40px; background: var(--primary); color: #fff;
            font-size: 10px; font-weight: 900; padding: 5px 20px; border-radius: 0 0 15px 15px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>PLANO DE CARREIRA COMPLETO • VOLUME MENSAL • VME</p>
</div>

<div class="config-panel">
    <div class="input-group">
        <label>NOVOS PARCEIROS/MÊS</label>
        <input type="number" id="inp_duplicacao" value="3" oninput="render()">
    </div>
    <div class="input-group">
        <label>VOLUME MOVIMENTADO/PESSOA</label>
        <input type="number" id="inp_consumo" value="300" oninput="render()">
    </div>
</div>

<div class="career-path" id="dashboard">
    </div>

<script>
function render() {
    const n = parseInt(document.getElementById('inp_duplicacao').value) || 0;
    const consumo = parseFloat(document.getElementById('inp_consumo').value) || 0;
    const container = document.getElementById('dashboard');
    
    let html = '';
    let redeAcumulada = 0;

    // Tabela Oficial Bonífica (Plano de Carreira Completo)
    const ranks = [
        { min: 2000, nome: "Start", pin: 150, vme: 0.50, cor: "#95a5a6" },
        { min: 5000, nome: "Senior", pin: 500, vme: 0.50, cor: "#2ecc71" },
        { min: 12000, nome: "Expert", pin: 1250, vme: 0.40, cor: "#e67e22" },
        { min: 28000, nome: "Professional", pin: 2500, vme: 0.40, cor: "#9b59b6" },
        { min: 50000, nome: "Diamond", pin: 5000, vme: 0.40, cor: "#3498db" },
        { min: 78000, nome: "Diamond Expert", pin: 12000, vme: 0.40, cor: "#f9b233" },
        { min: 122500, nome: "Diamond Global", pin: 24000, vme: 0.40, cor: "#00ced1" },
        { min: 250000, nome: "Ambassador", pin: 48000, vme: 0.35, cor: "#ff4757" },
        { min: 500000, nome: "President", pin: 100000, vme: 0.30, cor: "#d4af37" },
        { min: 1000000, nome: "Global President", pin: 200000, vme: 0.30, cor: "#ffffff" }
    ];

    for (let mes = 1; mes <= 10; mes++) {
        let novosNoMes = Math.pow(n, mes);
        redeAcumulada += novosNoMes;
        
        let volumeMensalTotal = redeAcumulada * consumo;
        let ptsOrg = volumeMensalTotal / 3;
        
        // Regra do 3D: Apenas se pontos orgânicos forem < 50.000 (Até Diamond)
        let is3DActive = (mes % 2 === 0 && ptsOrg < 50000);
        let ptsCarreira = is3DActive ? ptsOrg * 1.5 : ptsOrg;

        // Cálculo do Unilevel REAL por Geração (Página 43)
        let bonusUnilevelTotal = 0;
        for (let gen = 1; gen <= mes; gen++) {
            let pessoasGen = Math.pow(n, gen);
            let volumeGen = pessoasGen * consumo;
            let perc = 0.04; // 4º nível em diante
            if (gen === 1) perc = 0.05;
            if (gen === 2) perc = 0.05;
            if (gen === 3) perc = 0.09;
            bonusUnilevelTotal += volumeGen * perc;
        }

        // VME: Em rede 100% duplicada, cada braço tem (ptsCarreira / n)
        let ptsPorLinha = ptsCarreira / n;

        // Definição do Título com base em Pontos e Trava VME
        let rankFinal = { nome: "Consultor", pin: 0, cor: "#555", vme: 1 };
        for (let r of ranks) {
            let tetoVME = r.min * r.vme;
            if (ptsCarreira >= r.min && ptsPorLinha <= tetoVME) {
                rankFinal = r;
            }
        }

        let rendaTotal = bonusUnilevelTotal + rankFinal.pin;
        let vmeStatus = (ptsPorLinha / rankFinal.min) * 100 || 0;

        html += `
            <div class="level-card">
                ${is3DActive ? '<div class="acelerador-badge">ACELERADOR 3D ATIVO</div>' : ''}
                
                <div class="rank-info">
                    <span class="month">${mes}º</span>
                    <span style="font-size:12px; font-weight:700; color:#666;">MÊS</span>
                    <span class="rank-title" style="background:${rankFinal.cor}">${rankFinal.nome}</span>
                </div>

                <div class="data-grid">
                    <div class="data-item">
                        <span class="data-label">Volume de Rede</span>
                        <span class="data-value">${redeAcumulada.toLocaleString()} Parceiros</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Volume Movimentado</span>
                        <span class="data-value">R$ ${volumeMensalTotal.toLocaleString('pt-BR')}</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Volume de Pontos</span>
                        <span class="data-value">${Math.floor(ptsCarreira).toLocaleString()} Pts</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Bônus Level (Tabela)</span>
                        <span class="data-value">R$ ${bonusUnilevelTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">PIN Bonífica (Fixo)</span>
                        <span class="data-value">R$ ${rankFinal.pin.toLocaleString('pt-BR')}</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">VME (Max/Linha)</span>
                        <span class="data-value ${vmeStatus > (rankFinal.vme*100) ? 'vme-alert' : 'vme-ok'}">
                            ${vmeStatus.toFixed(1)}% de trava
                        </span>
                    </div>
                </div>

                <div class="income-result">
                    <span class="income-label">RENDA TOTAL</span>
                    <span class="income-value">R$ ${rendaTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}
render();
</script>

</body>
</html>
