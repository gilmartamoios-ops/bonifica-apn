<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Volumes | Sociedade de Consumo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --dark: #080808; --card: #121212; --gold: #ffcc00; --text: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 900; font-size: 2rem; color: var(--gold); text-transform: uppercase; margin: 0; }
        .config-panel { max-width: 900px; margin: 0 auto 40px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; display: flex; gap: 30px; justify-content: center; align-items: center; }
        .config-group { text-align: center; }
        .config-group label { display: block; font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
        .config-group input { background: #000; border: 1px solid #333; padding: 12px; border-radius: 10px; font-size: 24px; font-weight: 900; color: var(--primary); width: 150px; text-align: center; outline: none; }
        .career-path { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .level-card { background: var(--card); border-radius: 20px; padding: 30px; display: grid; grid-template-columns: 120px 1fr 250px; align-items: center; gap: 20px; border: 1px solid #222; position: relative; }
        .month-info { text-align: center; border-right: 1px solid #333; padding-right: 20px; }
        .month-info .num { font-size: 40px; font-weight: 900; color: #fff; display: block; }
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 20px; }
        .d-label { font-size: 9px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .d-value { font-size: 14px; font-weight: 700; color: #ddd; }
        .vme-box { color: var(--gold); border: 1px solid #444; padding: 6px 12px; border-radius: 5px; width: fit-content; margin-top: 5px; font-size: 12px; font-weight: 800; }
        .income-result { background: #000; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .income-label { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .income-value { font-size: 26px; font-weight: 900; color: var(--primary); display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>VOLUME MENSAL • VME EM VALOR DE PONTOS • BÔNUS UNILEVEL (R$)</p>
</div>

<div class="config-panel">
    <div class="config-group">
        <label>Parceiros Diretos</label>
        <input type="number" id="inp_n" value="3" oninput="exec()">
    </div>
    <div class="config-group">
        <label>Volume p/ Pessoa (R$)</label>
        <input type="number" id="inp_v" value="300" oninput="exec()">
    </div>
</div>

<div class="career-path" id="dashboard"></div>

<script>
function exec() {
    const n = parseInt(document.getElementById('inp_n').value) || 0;
    const v = parseFloat(document.getElementById('inp_v').value) || 0;
    const container = document.getElementById('dashboard');
    
    let html = '';
    let redeTotal = 0;

    for (let mes = 1; mes <= 12; mes++) {
        redeTotal += Math.pow(n, mes);
        let volTotalReais = redeTotal * v;
        let ptsOrgTotal = volTotalReais / 3;
        
        // Volume Pontos Carreira (Com acelerador 3D nos meses pares até 50k pts)
        let ptsCarreira = (mes % 2 === 0 && ptsOrgTotal < 50000) ? ptsOrgTotal * 1.5 : ptsOrgTotal;

        // BÔNUS UNILEVEL (Cálculo Rigoroso sobre VOLUME R$ conforme Tabelas)
        let unilevelReais = 0;
        for (let g = 1; g <= mes; g++) {
            let volGenReais = Math.pow(n, g) * v;
            let perc = 0.04; // 4% do volume (G4 em diante)
            if (g === 1 || g === 2) perc = 0.05; // 5% do volume (G1 e G2)
            if (g === 3) perc = 0.09; // 9% do volume (G3)
            unilevelReais += volGenReais * perc;
        }

        // VME EM VALOR DE PONTOS (Volume por Equipe)
        let ptsPorLinha = ptsCarreira / n;

        html += `
            <div class="level-card">
                <div class="month-info">
                    <span class="num">${mes}º</span>
                    <span style="font-size:10px; font-weight:700; color:#555;">MÊS</span>
                </div>
                <div class="data-grid">
                    <div class="data-item"><span class="d-label">Rede Ativa</span><span class="d-value">${redeTotal.toLocaleString()} Parceiros</span></div>
                    <div class="data-item"><span class="d-label">Volume Movimentado</span><span class="d-value">R$ ${volTotalReais.toLocaleString('pt-BR')}</span></div>
                    <div class="data-item"><span class="d-label">Volume em Pontos</span><span class="d-value">${Math.floor(ptsCarreira).toLocaleString()} pts</span></div>
                    <div class="data-item">
                        <span class="d-label">VME (Volume em Pontos p/ Linha)</span>
                        <div class="vme-box">${Math.floor(ptsPorLinha).toLocaleString()} pts</div>
                    </div>
                    <div class="data-item">
                        <span class="d-label">Residual por Geração (R$)</span>
                        <span class="d-value">G1:5% | G2:5% | G3:9% | G4+:4%</span>
                    </div>
                </div>
                <div class="income-result">
                    <span class="income-label">Bônus Unilevel Total</span>
                    <span class="income-value">R$ ${unilevelReais.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>`;
    }
    container.innerHTML = html;
}
exec();
</script>
</body>
</html>
