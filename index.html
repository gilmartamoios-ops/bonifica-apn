<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonífica | Simulador de Ciclos e Movimentação</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ff88; --dark: #080808; --card: #121212;
            --gold: #ffcc00; --text: #ffffff; --danger: #ff3366;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 900; color: var(--gold); text-transform: uppercase; font-size: 1.6rem; }
        
        .config-panel {
            max-width: 800px; margin: 0 auto 30px; background: var(--card);
            padding: 20px; border-radius: 15px; border: 1px solid #333;
            display: flex; gap: 20px; justify-content: center;
        }
        .config-group input { 
            background: #000; border: 1px solid var(--gold); padding: 10px; border-radius: 8px;
            font-size: 20px; font-weight: 900; color: var(--primary); width: 110px; text-align: center; outline: none;
        }

        .career-path { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .level-card {
            background: var(--card); border-radius: 20px; padding: 25px;
            display: grid; grid-template-columns: 160px 1fr 260px;
            align-items: center; gap: 20px; border: 1px solid #222;
            position: relative; overflow: hidden;
        }

        .ciclo-par { border-left: 5px solid var(--danger); background: #161616; }
        .ciclo-impar { border-left: 5px solid #444; }

        .rank-info { text-align: center; border-right: 1px solid #333; }
        .month-num { font-size: 38px; font-weight: 900; color: #fff; display: block; }
        .cycle-tag { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .tag-abertura { background: #333; color: #aaa; }
        .tag-fechamento { background: var(--danger); color: #fff; }

        /* Grid de dados atualizado para comportar a nova célula */
        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 9px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 2px; }
        .data-value { font-size: 13px; font-weight: 700; color: #eee; }
        
        .highlight-pts { color: var(--primary) !important; font-size: 15px; }
        .highlight-brl { color: #fff !important; }

        .income-box { background: #000; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .income-total { font-size: 26px; font-weight: 900; color: var(--primary); display: block; }

        .bonus-3d-alert {
            position: absolute; top: 10px; right: -30px; background: var(--danger);
            color: #fff; font-size: 10px; font-weight: 900; padding: 5px 40px;
            transform: rotate(45deg); box-shadow: 0 0 10px rgba(255,51,102,0.4);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Simulador Bonífica: Movimentação e Ciclos</h1>
    <p style="font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px;">Critério: 300 pts = R$ 0 PIN | Primeiro PIN aos 950 pts | Ciclo 60 Dias</p>
</div>

<div class="config-panel">
    <div class="config-group">
        <label style="color:var(--gold); display:block; font-size:10px; margin-bottom:5px; font-weight: 700;">DUPLICAÇÃO/MÊS</label>
        <input type="number" id="inp_n" value="5" oninput="run()">
    </div>
    <div class="config-group">
        <label style="color:var(--gold); display:block; font-size:10px; margin-bottom:5px; font-weight: 700;">CONSUMO MÉDIO (R$)</label>
        <input type="number" id="inp_v" value="300" oninput="run()">
    </div>
</div>

<div class="career-path" id="dashboard"></div>

<script>
function run() {
    const n = parseInt(document.getElementById('inp_n').value) || 0;
    const v = parseFloat(document.getElementById('inp_v').value) || 0;
    const container = document.getElementById('dashboard');
    
    let html = '';
    let redeTotal = 0;
    let ptsMesAnteriorParaBonus = 0;

    const tiers = [
        { pts: 950, pin: 100, vme: 0.5 },
        { pts: 2450, pin: 200, vme: 0.5 },
        { pts: 7250, pin: 700, vme: 0.4 },
        { pts: 14750, pin: 1300, vme: 0.4 },
        { pts: 27500, pin: 4000, vme: 0.4 },
        { pts: 60000, pin: 12000, vme: 0.4 },
        { pts: 122500, pin: 24000, vme: 0.4 },
        { pts: 247500, pin: 34000, vme: 0.35 },
        { pts: 495000, pin: 60000, vme: 0.3 },
        { pts: 1475000, pin: 130000, vme: 0.3 },
        { pts: 3000000, pin: 250000, vme: 0.3 }
    ];

    for (let mes = 1; mes <= 12; mes++) {
        redeTotal += Math.pow(n, mes);
        let faturamentoRedeBRL = redeTotal * v; // R$ Total movimentado
        let ptsRedeMensal = faturamentoRedeBRL / 3; // Total de pontos da rede
        
        let isFechamentoCiclo = (mes % 2 === 0);
        let bonus3D = 0;

        // Bônus 3D: Baseado no mês anterior do ciclo, limitado ao Diamond
        if (isFechamentoCiclo) {
            if (ptsRedeMensal > ptsMesAnteriorParaBonus && ptsRedeMensal <= 27500) {
                bonus3D = ptsMesAnteriorParaBonus; 
            }
        }

        let ptsParaCarreira = ptsRedeMensal + bonus3D;

        // Unilevel
        let unilevelBRL = 0;
        for (let g = 1; g <= mes; g++) {
            let volGen = Math.pow(n, g) * v;
            let p = (g === 1 || g === 2) ? 0.05 : (g === 3 ? 0.09 : 0.04);
            unilevelBRL += volGen * p;
        }

        // Determinação do PIN
        let currentPinBonus = 0;
        let pinName = 0;
        let ptsPorLinha = ptsParaCarreira / n;

        for (let t of tiers) {
            let ptsValidos = n * Math.min(ptsPorLinha, t.pts * t.vme);
            if (ptsValidos >= t.pts) {
                currentPinBonus = t.pin;
                pinName = t.pts;
            }
        }

        html += `
            <div class="level-card ${isFechamentoCiclo ? 'ciclo-par' : 'ciclo-impar'}">
                ${bonus3D > 0 ? '<div class="bonus-3d-alert">BÔNUS 3D ATIVO</div>' : ''}
                
                <div class="rank-info">
                    <span class="month-num">${mes}º</span>
                    <span class="cycle-tag ${isFechamentoCiclo ? 'tag-fechamento' : 'tag-abertura'}">
                        ${isFechamentoCiclo ? 'Fechamento de Ciclo' : 'Início de Ciclo'}
                    </span>
                    <div style="margin-top:12px">
                        <span style="font-size:9px; color:#777; display:block; font-weight:bold;">QUALIFICAÇÃO</span>
                        <span class="pin-result" style="color:${pinName > 0 ? 'var(--gold)' : '#555'}">
                            ${pinName > 0 ? pinName.toLocaleString() + ' PTS' : 'SEM PIN'}
                        </span>
                    </div>
                </div>
                
                <div class="data-grid">
                    <div class="data-item">
                        <span class="data-label">R$ Movimentado da Rede</span>
                        <span class="data-value highlight-brl">R$ ${faturamentoRedeBRL.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Total de Pontos da Rede</span>
                        <span class="data-value highlight-pts">${Math.floor(ptsRedeMensal).toLocaleString()} pts</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Ajuda Acelerador 3D</span>
                        <span class="data-value" style="color:${bonus3D > 0 ? 'var(--danger)' : '#444'}">+ ${Math.floor(bonus3D).toLocaleString()} pts</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Bônus PIN Mensal</span>
                        <span class="data-value" style="color:var(--gold)">R$ ${currentPinBonus.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div class="data-item" style="grid-column: span 2;">
                        <span class="data-label">Residual Unilevel (Mês)</span>
                        <span class="data-value">R$ ${unilevelBRL.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                </div>

                <div class="income-box">
                    <span class="data-label" style="color:var(--primary)">RENDIMENTO TOTAL NO MÊS</span>
                    <span class="income-total">R$ ${(unilevelBRL + currentPinBonus).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>`;
        
        ptsMesAnteriorParaBonus = ptsRedeMensal;
    }
    container.innerHTML = html;
}
run();
</script>
</body>
</html>
