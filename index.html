<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sociedade de Consumo e Renda Bonífica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a859; --dark: #1d1d1b; --gold: #f9b233; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .hero { background: var(--dark); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 1100px; margin: -30px auto 20px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f9f9f9; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .chart-container { position: relative; height: 350px; width: 100%; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .rank-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; text-transform: uppercase; }
        .highlight-val { color: var(--primary); font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>Simulador Oficial de Expansão de Rede e Ganhos</p>
</div>

<div class="container">
    <div class="controls">
        <div>
            <label>Novos Associados p/ Mês:</label>
            <input type="number" id="duplicacao" value="3" oninput="executarSimulacao()">
        </div>
        <div>
            <label>Valor Movimentado p/ Pessoa (R$):</label>
            <input type="number" id="consumo" value="300" oninput="executarSimulacao()">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="graficoGanhos"></canvas>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Mês</th>
                    <th>Rede Acum.</th>
                    <th>Nível PIN</th>
                    <th>Valor Movimentado</th>
                    <th>Pontos</th>
                    <th>Bônus PIN (Fixo)</th>
                    <th>Renda Total</th>
                </tr>
            </thead>
            <tbody id="tabela-dados"></tbody>
        </table>
    </div>
</div>

<script>
let meuGrafico;

function executarSimulacao() {
    const n = parseInt(document.getElementById('duplicacao').value) || 0;
    const consumo = parseFloat(document.getElementById('consumo').value) || 0;
    const corpo = document.getElementById('tabela-dados');
    
    let labels = [];
    let dadosGanhos = [];
    let html = '';
    let totalPessoas = 0;

    for (let mes = 1; mes <= 6; mes++) {
        totalPessoas += Math.pow(n, mes);
        let volumeMensal = totalPessoas * consumo;
        let pontosOrganicos = volumeMensal / 3;
        
        // Regra do Acelerador 30D: +50% pontos se pontos < 50.000 (até Diamond)
        let pontosCalculoPIN = (pontosOrganicos < 50000) ? pontosOrganicos * 1.5 : pontosOrganicos;

        // Tabela de Graduação Bonífica (Corrigida conforme PDF)
        let pin = { nome: "Consultor", fixo: 0, cor: "#999" };
        if (pontosCalculoPIN >= 122500) pin = { nome: "Diamond Global", fixo: 24000, cor: "#00ced1" };
        else if (pontosCalculoPIN >= 78000) pin = { nome: "Diamond Expert", fixo: 12000, cor: "#f9b233" };
        else if (pontosCalculoPIN >= 50000) pin = { nome: "Diamond", fixo: 5000, cor: "#3498db" };
        else if (pontosCalculoPIN >= 28000) pin = { nome: "Professional", fixo: 2500, cor: "#9b59b6" };
        else if (pontosCalculoPIN >= 12000) pin = { nome: "Expert", fixo: 1250, cor: "#e67e22" };
        else if (pontosCalculoPIN >= 5000) pin = { nome: "Senior", fixo: 500, cor: "#27ae60" };
        else if (pontosCalculoPIN >= 2000) pin = { nome: "Start", fixo: 150, cor: "#7f8c8d" };

        let unilevel = volumeMensal * 0.05; // Média estimada de 5% sobre faturamento
        let totalMensal = unilevel + pin.fixo;

        labels.push(mes + "º Mês");
        dadosGanhos.push(totalMensal);

        html += `
            <tr>
                <td>${mes}º Mês</td>
                <td>${totalPessoas}</td>
                <td><span class="rank-badge" style="background:${pin.cor}">${pin.nome}</span></td>
                <td>R$ ${volumeMensal.toLocaleString('pt-BR')}</td>
                <td>${Math.floor(pontosCalculoPIN).toLocaleString('pt-BR')}</td>
                <td>R$ ${pin.fixo.toLocaleString('pt-BR')}</td>
                <td class="highlight-val">R$ ${totalMensal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            </tr>
        `;
    }

    corpo.innerHTML = html;
    renderizarGrafico(labels, dadosGanhos);
}

function renderizarGrafico(labels, dados) {
    const ctx = document.getElementById('graficoGanhos').getContext('2d');
    if (meuGrafico) meuGrafico.destroy();

    meuGrafico = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Renda Mensal Estimada (R$)',
                data: dados,
                backgroundColor: '#00a859',
                borderRadius: 5,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: (context) => 'R$ ' + context.raw.toLocaleString('pt-BR') } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { callback: (v) => 'R$ ' + v } }
            }
        }
    });
}

executarSimulacao();
</script>
</body>
</html>
