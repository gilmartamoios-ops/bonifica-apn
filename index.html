    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a859; --dark: #1d1d1b; --gold: #f9b233; --blue: #3498db; --bg: #f4f7f6; }

        th { background: #f8f9fa; color: var(--dark); padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .rank-badge { padding: 5px 10px; border-radius: 5px; font-weight: 700; font-size: 11px; color: white; text-transform: uppercase; display: inline-block; }
        .val-total { font-weight: 700; color: var(--primary); font-size: 1.1em; }
        .acelerador-tag { font-size: 10px; background: #ff7675; color: white; padding: 2px 5px; border-radius: 3px; margin-top: 5px; display: inline-block; }
    </style>
</head>
