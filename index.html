<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sociedade de Consumo e Renda Bonífica | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ff88; --dark: #080808; --card: #121212;
            --gold: #ffcc00; --text: #ffffff; --danger: #ff3366;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-weight: 900; font-size: 2.2rem; color: var(--gold); margin: 0; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,204,0,0.3); }
        .header p { opacity: 0.7; letter-spacing: 2px; font-size: 0.8rem; margin-top: 10px; }

        .config-panel {
            max-width: 1000px; margin: 0 auto 50px; background: var(--card);
            padding: 30px; border-radius: 20px; border: 1px solid #222;
            display: flex; gap: 30px; justify-content: center; align-items: center;
        }
        .config-group { text-align: center; }
        .config-group label { display: block; font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; }
        .config-group input { 
            background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 12px;
            font-size: 28px; font-weight: 900; color: var(--primary); width: 160px; text-align: center; outline: none;
        }

        .career-path { max-width: 1150px; margin: auto; display: flex; flex-direction: column; gap: 25px; }
        
        .level-card {
            background: var(--card); border-radius: 25px; padding: 35px;
            display: grid; grid-template-columns: 200px 1fr 280px;
            align-items: center; gap: 30px; border: 1px solid #222;
            transition: all 0.4s; position: relative;
        }
        .level-card:hover { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,255,136,0.1); }

        .rank-info { text-align: center; border-right: 1px solid #333; padding-right: 20px; }
        .rank-info .month { font-size: 52px; font-weight: 900; color: #fff; display: block; line-height: 1; }
        .rank-title { 
            color: #000; padding: 10px 15px; border-radius: 8px;
            font-size: 11px; font-weight: 900; display: inline-block; margin-top: 15px;
            min-width: 170px; text-transform: uppercase; letter-spacing: 1px;
        }

        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 20px; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .data-value { font-size: 14px; font-weight: 700; color: #ddd; }
        
        .vme-status { font-size: 11px; font-weight: 900; margin-top: 10px; }
        .vme-alert { color: var(--danger); }
        .vme-ok { color: var(--primary); }

        .income-result { 
            background: #000; padding: 25px; border-radius: 20px; text-align: center;
            border: 1px solid #333; box-shadow: inset 0 0 20px rgba(0,255,136,0.05);
        }
        .income-label { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .income-value { font-size: 32px; font-weight: 900; color: var(--primary); display: block; margin-top: 5px; }

        .acelerador-badge {
            position: absolute; top: 0; right: 40px; background: var(--danger); color: #fff;
            font-size: 9px; font-weight: 900; padding: 5px 20px; border-radius: 0 0 15px 15px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>VOLUME MENSAL • VME • PIN BONÍFICA FIXO • GERAÇÕES 5-5-9-4%</p>
</div>

<div class="config-panel">
    <div class="config-group">
        <label>Parceiros Diretos</label>
        <input type="number" id="inp_n" value="3" oninput="run()">
    </div>
    <div class="config-group">
        <label>Volume p/ Pessoa (R$)</label>
        <input type="number" id="inp_v" value="300" oninput="run()">
    </div>
</div>

<div class="career-path" id="dashboard"></div>

<script>
function run() {
    const n = parseInt(document.getElementById('inp_n').value) || 0;
    const v = parseFloat(document.getElementById('inp_v').value) || 0;
    const container = document.getElementById('dashboard');
    
    let html = '';
    let redeTotal = 0;

    // NOMENCLATURA RIGOROSA BONÍFICA (CONFORME SUA SEQUÊNCIA)
    const ranks = [
        { min: 0, nome: "Consultor", pin: 0, vme: 1.0, cor: "#7f8c8d" },
        { min: 2000, nome: "Empreendedor", pin: 150, vme: 0.50, cor: "#00E5FF" },
        { min: 5000, nome: "Sênior", pin: 500, vme: 0.50, cor: "#00FF41" },
        { min: 12000, nome: "Expert", pin: 1250, vme: 0.40, cor: "#FFD700" },
        { min: 28000, nome: "Enterprise", pin: 2500, vme: 0.40, cor: "#FF00FF" },
        { min: 50000, nome: "Diamond", pin: 5000, vme: 0.40, cor: "#3D5AFE" },
        { min: 78000, nome: "Diamond Expert", pin: 12000, vme: 0.40, cor: "#FF9100" },
        { min: 122500, nome: "Diamond Global", pin: 24000, vme: 0.40, cor: "#1DE9B6" },
        { min: 250000, nome: "Empresarial Diamond", pin: 48000, vme: 0.35, cor: "#F44336" },
        { min: 500000, nome: "Imperial Bonific", pin: 100000, vme: 0.30, cor: "#FFEB3B" },
        { min: 1000000, nome: "Majestic Bonific", pin: 200000, vme: 0.30, cor: "#ffffff" },
        { min: 2000000, nome: "Empresarial", pin: 400000, vme: 0.30, cor: "#ff3366" }
    ];

    for (let mes = 1; mes <= 12; mes++) {
        let novos = Math.pow(n, mes);
        redeTotal += novos;
        
        let volTotal = redeTotal * v;
        let ptsOrg = volTotal / 3;
        
        // Acelerador 3D (Até Diamond 50k)
        let is3D = (mes % 2 === 0 && ptsOrg < 50000);
        let ptsCarreira = is3D ? ptsOrg * 1.5 : ptsOrg;

        // Bônus Unilevel Geração (5%, 5%, 9%, 4%)
        let unilevel = 0;
        for (let g = 1; g <= mes; g++) {
            let volGen = Math.pow(n, g) * v;
            let p = (g === 1 || g === 2) ? 0.05 : (g === 3 ? 0.09 : 0.04);
            unilevel += volGen * p;
        }

        // Lógica de Trava VME e Qualificação
        let ptsPorLinha = ptsCarreira / n;
        let rankAtivo = ranks[0];
        
        for (let r of ranks) {
            let ptsQualificados = n * Math.min(ptsPorLinha, r.min * r.vme);
            if (ptsQualificados >= r.min) rankAtivo = r;
        }

        let rendaFinal = unilevel + rankAtivo.pin;
        let vmePerc = (ptsPorLinha / rankAtivo.min) * 100 || 0;

        html += `
            <div class="level-card">
                ${is3D ? '<div class="acelerador-badge">3D ATIVO</div>' : ''}
                <div class="rank-info">
                    <span class="month">${mes}º</span>
                    <span style="font-size:10px; font-weight:700; color:#555;">MÊS</span>
                    <span class="rank-title" style="background:${rankAtivo.cor}">${rankAtivo.nome}</span>
                </div>
                <div class="data-grid">
                    <div class="data-item"><span class="data-label">Rede Acumulada</span><span class="data-value">${redeTotal.toLocaleString()} Parceiros</span></div>
                    <div class="data-item"><span class="data-label">Volume Movimentado</span><span class="data-value">R$ ${volTotal.toLocaleString('pt-BR')}</span></div>
                    <div class="data-item"><span class="data-label">Volume Pontos</span><span class="data-value">${Math.floor(ptsCarreira).toLocaleString()} pts</span></div>
                    <div class="data-item"><span class="data-label">Bônus Level</span><span class="data-value">R$ ${unilevel.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                    <div class="data-item"><span class="data-label">PIN Bonífica (Fixo)</span><span class="data-value" style="color:var(--gold)">R$ ${rankAtivo.pin.toLocaleString('pt-BR')}</span></div>
                    <div class="data-item">
                        <span class="data-label">VME (Trava por Equipe)</span>
                        <span class="vme-status ${vmePerc > (rankAtivo.vme*100) ? 'vme-alert' : 'vme-ok'}">
                            ${vmePerc.toFixed(1)}% / Máx ${rankAtivo.vme*100}%
                        </span>
                    </div>
                </div>
                <div class="income-result">
                    <span class="income-label">RENDA MENSAL TOTAL</span>
                    <span class="income-value">R$ ${rendaFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>`;
    }
    container.innerHTML = html;
}
run();
</script>
</body>
</html>
