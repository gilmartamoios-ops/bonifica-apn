<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sociedade de Consumo e Renda Bonífica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a859; --dark: #1d1d1b; --gold: #f9b233; --bg: #f0f2f5; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-weight: 800; color: var(--dark); text-transform: uppercase; letter-spacing: -1px; }
        .header p { margin: 5px 0; color: #666; font-size: 1.1em; }
        
        .card { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .inputs { display: flex; gap: 20px; justify-content: center; margin-bottom: 40px; background: #fff; border: 2px solid #eee; padding: 20px; border-radius: 15px; }
        .input-group { text-align: center; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #888; text-transform: uppercase; }
        input { border: none; background: #f8f9fa; padding: 10px 20px; border-radius: 10px; font-size: 22px; font-weight: 800; color: var(--primary); text-align: center; width: 120px; border: 2px solid transparent; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }

        .chart-wrapper { height: 900px; width: 100%; } /* Altura grande para caber os textos */
        
        .legenda { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .legenda-item { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 5px; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>Simulação Realista: O Caminho para a Liberdade Financeira em 3 Ciclos</p>
</div>

<div class="card">
    <div class="inputs">
        <div class="input-group">
            <label>Novos Parceiros/Mês</label>
            <input type="number" id="input_rede" value="3" oninput="atualizar()">
        </div>
        <div class="input-group">
            <label>Valor Movimentado (R$)</label>
            <input type="number" id="input_mov" value="300" oninput="atualizar()">
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="meuGrafico"></canvas>
    </div>

    <div class="legenda" id="legenda_ranks"></div>
</div>

<script>
Chart.register(ChartDataLabels);
let graficoInstancia;

function calcularDados() {
    const n = parseInt(document.getElementById('input_rede').value) || 0;
    const consumo = parseFloat(document.getElementById('input_mov').value) || 0;
    
    let totalPessoas = 0;
    let resultados = [];

    for (let mes = 1; mes <= 6; mes++) {
        totalPessoas += Math.pow(n, mes);
        let volMovimentado = totalPessoas * consumo;
        let pontosBase = volMovimentado / 3;
        
        let isFechamento = (mes % 2 === 0);
        let pontosPIN = isFechamento ? pontosBase * 1.5 : pontosBase;

        let rank = { nome: "Consultor", fixo: 0, cor: "#bdc3c7" };
        if (pontosPIN >= 122500) rank = { nome: "Diamond Global", fixo: 24000, cor: "#00ced1" };
        else if (pontosPIN >= 78000) rank = { nome: "Diamond Expert", fixo: 12000, cor: "#f9b233" };
        else if (pontosPIN >= 50000) rank = { nome: "Diamond", fixo: 5000, cor: "#3498db" };
        else if (pontosPIN >= 28000) rank = { nome: "Professional", fixo: 2500, cor: "#9b59b6" };
        else if (pontosPIN >= 12000) rank = { nome: "Expert", fixo: 1250, cor: "#e67e22" };
        else if (pontosPIN >= 5000) rank = { nome: "Senior", fixo: 500, cor: "#2ecc71" };
        else if (pontosPIN >= 2000) rank = { nome: "Start", fixo: 150, cor: "#95a5a6" };

        let unilevel = volMovimentado * 0.05;
        let rendaTotal = unilevel + rank.fixo;

        resultados.push({
            mes: mes,
            rede: totalPessoas,
            titulo: rank.nome,
            movimentado: volMovimentado,
            pontos: Math.floor(pontosPIN),
            unilevel: unilevel,
            pin: rank.fixo,
            total: rendaTotal,
            cor: rank.cor,
            acelerador: isFechamento
        });
    }
    return resultados;
}

function atualizar() {
    const dados = calcularDados();
    const ctx = document.getElementById('meuGrafico').getContext('2d');

    if (graficoInstancia) graficoInstancia.destroy();

    graficoInstancia = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: dados.map(d => d.mes + "º MÊS"),
            datasets: [{
                data: dados.map(d => d.total),
                backgroundColor: dados.map(d => d.cor),
                borderRadius: 15,
                barThickness: 110
            }]
        },
        options: {
            indexAxis: 'y', // Inverte para barras horizontais
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 100 } },
            scales: {
                x: { display: false, beginAtZero: true },
                y: { grid: { display: false }, ticks: { font: { weight: '800', size: 14 } } }
            },
            plugins: {
                legend: { display: false },
                datalabels: {
                    align: 'end',
                    anchor: 'start',
                    color: (context) => {
                        // Texto preto se a barra for muito clara, branco se for escura
                        return '#1d1d1b';
                    },
                    offset: 15,
                    font: { size: 12, family: 'Poppins' },
                    formatter: (value, context) => {
                        const d = dados[context.dataIndex];
                        return [
                            `🏆 ${d.titulo.toUpperCase()}`,
                            `👥 Rede: ${d.rede.toLocaleString()} pessoas`,
                            `📦 Movimentado: R$ ${d.movimentado.toLocaleString('pt-BR')}`,
                            `✨ Pontos: ${d.pontos.toLocaleString()} ${d.acelerador ? '(3D)' : ''}`,
                            `💰 Bônus Level: R$ ${d.unilevel.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`,
                            `🎗️ PIN Bonífica: R$ ${d.pin.toLocaleString('pt-BR')}`,
                            `➔ RENDA TOTAL: R$ ${d.total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`
                        ];
                    },
                    textAlign: 'left',
                    padding: 10
                }
            }
        }
    });
}

atualizar();
</script>

</body>
</html>
