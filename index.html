<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonífica | Dashboard de Ganhos Realista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ff88; --dark: #080808; --card: #121212;
            --gold: #ffcc00; --text: #ffffff; --danger: #ff3366;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 900; font-size: 1.8rem; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .header p { opacity: 0.7; letter-spacing: 1px; font-size: 0.8rem; margin-top: 10px; }

        .config-panel {
            max-width: 900px; margin: 0 auto 40px; background: var(--card);
            padding: 25px; border-radius: 20px; border: 1px solid #222;
            display: flex; gap: 40px; justify-content: center; align-items: center;
        }
        .config-group { text-align: center; }
        .config-group label { display: block; font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; }
        .config-group input { 
            background: #000; border: 1px solid var(--gold); padding: 12px; border-radius: 12px;
            font-size: 24px; font-weight: 900; color: var(--primary); width: 140px; text-align: center; outline: none;
        }

        .career-path { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .level-card {
            background: var(--card); border-radius: 25px; padding: 30px;
            display: grid; grid-template-columns: 180px 1fr 280px;
            align-items: center; gap: 20px; border: 1px solid #222;
            transition: 0.3s; position: relative;
        }

        .rank-info { text-align: center; border-right: 1px solid #333; }
        .rank-info .month { font-size: 44px; font-weight: 900; color: #fff; display: block; line-height: 1; }
        .rank-info .sub { font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; margin-top: 5px; display: block; }
        .pin-label { 
            color: #000; padding: 6px 12px; border-radius: 6px; background: var(--gold);
            font-size: 11px; font-weight: 900; display: inline-block; margin-top: 15px;
            width: 140px; text-transform: uppercase;
        }

        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 10px; font-weight: 700; color: #777; text-transform: uppercase; }
        .data-value { font-size: 14px; font-weight: 700; color: #eee; }
        
        .bonus-highlight { color: var(--gold) !important; font-size: 16px; font-weight: 900; }
        .unilevel-highlight { color: #fff !important; font-size: 16px; font-weight: 900; }

        .income-result { 
            background: #000; padding: 20px; border-radius: 20px; text-align: center;
            border: 1px solid #333;
        }
        .income-label { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .income-value { font-size: 28px; font-weight: 900; color: var(--primary); display: block; margin-top: 5px; }

        .acelerador-badge {
            position: absolute; top: 0; right: 40px; background: var(--danger); color: #fff;
            font-size: 9px; font-weight: 900; padding: 5px 15px; border-radius: 0 0 10px 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>SIMULAÇÃO DE GANHOS • ACELERADOR 30D ATÉ 27.500 PTS • PIN POR PONTUAÇÃO</p>
</div>

<div class="config-panel">
    <div class="config-group">
        <label>Parceiros/Mês</label>
        <input type="number" id="inp_n" value="5" oninput="run()">
    </div>
    <div class="config-group">
        <label>Consumo Médio (R$)</label>
        <input type="number" id="inp_v" value="300" oninput="run()">
    </div>
</div>

<div class="career-path" id="dashboard"></div>

<script>
function run() {
    const n = parseInt(document.getElementById('inp_n').value) || 0;
    const v = parseFloat(document.getElementById('inp_v').value) || 0;
    const container = document.getElementById('dashboard');
    
    let html = '';
    let redeTotal = 0;
    let ptsAnterior = 0;

    const tiers = [
        { pts: 0, pin: 0, vme: 1.0 },
        { pts: 950, pin: 100, vme: 0.5 },
        { pts: 2450, pin: 200, vme: 0.5 },
        { pts: 7250, pin: 700, vme: 0.4 },
        { pts: 14750, pin: 1300, vme: 0.4 },
        { pts: 27500, pin: 4000, vme: 0.4 },
        { pts: 60000, pin: 12000, vme: 0.4 },
        { pts: 122500, pin: 24000, vme: 0.4 },
        { pts: 247500, pin: 34000, vme: 0.35 },
        { pts: 495000, pin: 60000, vme: 0.3 },
        { pts: 1475000, pin: 130000, vme: 0.3 },
        { pts: 3000000, pin: 250000, vme: 0.3 }
    ];

    for (let mes = 1; mes <= 12; mes++) {
        redeTotal += Math.pow(n, mes);
        let volTotalBRL = redeTotal * v;
        let ptsMensalReal = (volTotalBRL / 3);
        
        // LÓGICA ACELERADOR 30D
        // "Após o 2º mês, se o 2º ultrapassar o 1º, a empresa dobra a pontuação do 1º"
        // Aplicável apenas até o Diamond (27.500 pts)
        let bonus30D = 0;
        let is3DAtivo = false;

        if (mes > 1 && ptsMensalReal > ptsAnterior && ptsMensalReal <= 27500) {
            bonus30D = ptsAnterior; // Dobra a pontuação do mês anterior (o "primeiro" do ciclo)
            is3DAtivo = true;
        }
        
        let ptsCarreira = ptsMensalReal + bonus30D;

        // CÁLCULO UNILEVEL
        let unilevelBRL = 0;
        for (let g = 1; g <= mes; g++) {
            let volGen = Math.pow(n, g) * v;
            let p = 0.04;
            if(g === 1 || g === 2) p = 0.05;
            if(g === 3) p = 0.09;
            unilevelBRL += volGen * p;
        }

        // CÁLCULO DE PIN ATINGIDO
        let ptsPorLinha = ptsCarreira / n;
        let currentPinVal = 0;
        let pinName = 0;

        for (let t of tiers) {
            let ptsValidos = n * Math.min(ptsPorLinha, t.pts * t.vme);
            if (ptsValidos >= t.pts) {
                currentPinVal = t.pin;
                pinName = t.pts;
            }
        }

        let rendaFinal = unilevelBRL + currentPinVal;

        html += `
            <div class="level-card">
                ${is3DAtivo ? '<div class="acelerador-badge">ACELERADOR 30D (+'+Math.floor(bonus30D).toLocaleString()+' pts)</div>' : ''}
                <div class="rank-info">
                    <span class="month">${mes}º</span>
                    <span class="sub">Mês de Projeto</span>
                    <span class="pin-label">PIN ${pinName.toLocaleString()} PTS</span>
                </div>
                <div class="data-grid">
                    <div class="data-item"><span class="data-label">Produção Mensal</span><span class="data-value">${Math.floor(ptsMensalReal).toLocaleString()} pts</span></div>
                    <div class="data-item"><span class="data-label">Pontuação Carreira</span><span class="data-value">${Math.floor(ptsCarreira).toLocaleString()} pts</span></div>
                    <div class="data-item"><span class="data-label">Residual Unilevel</span><span class="data-value unilevel-highlight">R$ ${unilevelBRL.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                    <div class="data-item"><span class="data-label">Bônus PIN Fixo</span><span class="data-value bonus-highlight">R$ ${currentPinVal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                </div>
                <div class="income-result">
                    <span class="income-label">GANHO TOTAL NO MÊS</span>
                    <span class="income-value">R$ ${rendaFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>`;
        
        ptsAnterior = ptsMensalReal; // Atualiza para a comparação do próximo mês
    }
    container.innerHTML = html;
}
run();
</script>
</body>
</html>
