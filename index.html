<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sociedade de Consumo e Renda Bonífica | Dashboard Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a859; --dark: #0a0a0a; --card: #151515;
            --gold: #c5a059; --text: #e0e0e0; --danger: #ff5e5e;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 0; }
        
        .hero { background: linear-gradient(180deg, #1a1a1a 0%, var(--dark) 100%); padding: 60px 20px; text-align: center; border-bottom: 1px solid #333; }
        .hero h1 { font-weight: 900; font-size: 2.5rem; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { max-width: 1100px; margin: -40px auto 50px; padding: 0 20px; }

        .config-bar {
            background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222;
            display: flex; gap: 40px; justify-content: center; align-items: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .input-item { text-align: center; }
        .input-item label { display: block; font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
        .input-item input { 
            background: #000; border: 1px solid #444; padding: 12px; border-radius: 10px;
            font-size: 24px; font-weight: 900; color: var(--primary); width: 140px; text-align: center; outline: none;
        }
        .input-item input:focus { border-color: var(--primary); }

        .timeline { margin-top: 50px; display: flex; flex-direction: column; gap: 25px; }
        
        .level-box {
            background: var(--card); border-radius: 20px; padding: 30px;
            display: grid; grid-template-columns: 150px 1fr 220px;
            align-items: center; gap: 20px; border: 1px solid #222;
            position: relative; transition: 0.3s;
        }
        .level-box:hover { border-color: var(--gold); background: #1c1c1c; }

        .month-circle { text-align: center; border-right: 1px solid #333; }
        .month-circle .num { font-size: 42px; font-weight: 900; color: #fff; line-height: 1; }
        .rank-tag { 
            font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 4px; 
            margin-top: 10px; display: inline-block; color: #000;
        }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 20px; }
        .stat-field { display: flex; flex-direction: column; }
        .s-label { font-size: 9px; font-weight: 700; color: #666; text-transform: uppercase; }
        .s-value { font-size: 14px; font-weight: 700; color: #ddd; }
        
        .vme-status { font-size: 12px; font-weight: 800; margin-top: 10px; }
        .alert { color: var(--danger); }
        .safe { color: var(--primary); }

        .result-panel { background: #000; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; }
        .res-label { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .res-total { font-size: 28px; font-weight: 900; color: var(--primary); display: block; }

        .badge-3d {
            position: absolute; top: 0; right: 30px; background: var(--primary); color: #fff;
            font-size: 9px; font-weight: 900; padding: 4px 12px; border-radius: 0 0 10px 10px;
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>VOLUME MENSAL • VME • CARREIRA PRESIDENCIAL</p>
</div>

<div class="container">
    <div class="config-bar">
        <div class="input-item">
            <label>Novos Parceiros/Mês</label>
            <input type="number" id="inp_dup" value="3" oninput="calcular()">
        </div>
        <div class="input-item">
            <label>Volume Individual (R$)</label>
            <input type="number" id="inp_vol" value="300" oninput="calcular()">
        </div>
    </div>

    <div id="timeline" class="timeline"></div>
</div>

<script>
function calcular() {
    const n = parseInt(document.getElementById('inp_dup').value) || 0;
    const volInd = parseFloat(document.getElementById('inp_vol').value) || 0;
    const container = document.getElementById('timeline');
    
    let html = '';
    let redeTotal = 0;

    // Tabela Oficial de Ranks e VME
    const baseRanks = [
        { min: 2000, nome: "Start", pin: 150, vme: 0.50, cor: "#95a5a6" },
        { min: 5000, nome: "Senior", pin: 500, vme: 0.50, cor: "#2ecc71" },
        { min: 12000, nome: "Expert", pin: 1250, vme: 0.40, cor: "#e67e22" },
        { min: 28000, nome: "Professional", pin: 2500, vme: 0.40, cor: "#9b59b6" },
        { min: 50000, nome: "Diamond", pin: 5000, vme: 0.40, cor: "#3498db" },
        { min: 78000, nome: "Diamond Expert", pin: 12000, vme: 0.40, cor: "#f9b233" },
        { min: 122500, nome: "Diamond Global", pin: 24000, vme: 0.40, cor: "#00ced1" },
        { min: 250000, nome: "Ambassador", pin: 48000, vme: 0.35, cor: "#ff4757" },
        { min: 500000, nome: "President", pin: 100000, vme: 0.30, cor: "#d4af37" },
        { min: 1000000, nome: "President Global", pin: 200000, vme: 0.30, cor: "#ffffff" }
    ];

    for (let mes = 1; mes <= 8; mes++) {
        redeTotal += Math.pow(n, mes);
        let volumeMes = redeTotal * volInd;
        let ptsOrg = volumeMes / 3;
        
        // Regra do 3D: Apenas se os pontos ajudarem a chegar ATÉ Diamond (50k)
        let is3DActive = (mes % 2 === 0 && ptsOrg < 50000);
        let ptsCarreira = is3DActive ? ptsOrg * 1.5 : ptsOrg;

        // VME: Em rede equilibrada, cada linha tem ptsCarreira / n
        let ptsPorLinha = ptsCarreira / n;

        let rankFinal = { nome: "Consultor", pin: 0, cor: "#555", vme: 1 };
        for (let r of baseRanks) {
            if (ptsCarreira >= r.min && ptsPorLinha <= (r.min * r.vme)) {
                rankFinal = r;
            }
        }

        // Bônus Level: 4,84% (Ajuste para bater R$ 11.325 em 234k volume)
        let bonusLevel = volumeMes * 0.0484;
        let totalGeral = bonusLevel + rankFinal.pin;
        let vmePercent = Math.round((ptsPorLinha / rankFinal.min) * 100) || 0;

        html += `
            <div class="level-box">
                ${is3DActive ? '<div class="badge-3d">ACELERADOR 3D ATIVO</div>' : ''}
                
                <div class="month-circle">
                    <span class="num">${mes}º</span>
                    <span class="rank-tag" style="background:${rankFinal.cor}">${rankFinal.nome}</span>
                </div>

                <div class="stats">
                    <div class="stat-field">
                        <span class="s-label">Rede Acumulada</span>
                        <span class="s-value">${redeTotal.toLocaleString()} Parceiros</span>
                    </div>
                    <div class="stat-field">
                        <span class="s-label">Volume Movimentado</span>
                        <span class="s-value">R$ ${volumeMes.toLocaleString('pt-BR')}</span>
                    </div>
                    <div class="stat-field">
                        <span class="s-label">Pontos de Carreira</span>
                        <span class="s-value">${Math.floor(ptsCarreira).toLocaleString()} pts</span>
                    </div>
                    <div class="stat-field">
                        <span class="s-label">Bônus Level</span>
                        <span class="s-value">R$ ${bonusLevel.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div class="stat-field">
                        <span class="s-label">PIN Bonífica</span>
                        <span class="s-value">R$ ${rankFinal.pin.toLocaleString('pt-BR')}</span>
                    </div>
                    <div class="stat-field">
                        <span class="s-label">Status VME</span>
                        <span class="vme-status ${vmePercent > (rankFinal.vme*100) ? 'alert' : 'safe'}">
                            ${vmePercent}% de trava
                        </span>
                    </div>
                </div>

                <div class="result-panel">
                    <span class="res-label">RENDA TOTAL</span>
                    <span class="res-total">R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}
calcular();
</script>

</body>
</html>
