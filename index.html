<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sociedade de Consumo e Renda Bonífica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a859; --dark: #1d1d1b; --gold: #f9b233; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .hero { background: var(--dark); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 1200px; margin: -30px auto 20px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f9f9f9; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .chart-container { position: relative; height: 350px; width: 100%; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .rank-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; text-transform: uppercase; }
        .acelerador-info { font-size: 11px; color: #e74c3c; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>Simulador com Lógica de Ciclo (Acelerador 30D Temporário)</p>
</div>

<div class="container">
    <div class="controls">
        <div>
            <label>Membros novos por mês:</label>
            <input type="number" id="duplicacao" value="3" oninput="executarSimulacao()">
        </div>
        <div>
            <label>Valor Movimentado p/ Pessoa (R$):</label>
            <input type="number" id="consumo" value="300" oninput="executarSimulacao()">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="graficoGanhos"></canvas>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Mês / Ciclo</th>
                    <th>Rede Acum.</th>
                    <th>Nível PIN</th>
                    <th>Valor Movimentado</th>
                    <th>Pontos de Carreira</th>
                    <th>Bônus PIN (Fixo)</th>
                    <th>Renda Total</th>
                </tr>
            </thead>
            <tbody id="tabela-dados"></tbody>
        </table>
    </div>
</div>

<script>
let meuGrafico;

function executarSimulacao() {
    const n = parseInt(document.getElementById('duplicacao').value) || 0;
    const consumo = parseFloat(document.getElementById('consumo').value) || 0;
    const corpo = document.getElementById('tabela-dados');
    
    let labels = [];
    let dadosGanhos = [];
    let html = '';
    let totalPessoas = 0;
    let pontosOrg_Acumulados = 0;

    for (let mes = 1; mes <= 6; mes++) {
        totalPessoas += Math.pow(n, mes);
        let volumeMensal = totalPessoas * consumo;
        let pontosMesOrg = volumeMensal / 3;
        
        // A lógica de pontuação de carreira da Bonífica para graduação:
        // No fechamento do ciclo (meses 2, 4, 6), aplica-se o 3D (zera após o fechamento)
        let pontosParaPIN = 0;
        let isFechamento = (mes % 2 === 0);
        
        if (isFechamento) {
            // No mês de fechamento, soma-se o orgânico do mês + o bônus da empresa (3D)
            pontosParaPIN = pontosMesOrg * 1.5; 
        } else {
            pontosParaPIN = pontosMesOrg;
        }

        // Tabela de Graduação baseada nos pontos do CICLO
        let pin = { nome: "Consultor", fixo: 0, cor: "#999" };
        if (pontosParaPIN >= 122500) pin = { nome: "Diamond Global", fixo: 24000, cor: "#00ced1" };
        else if (pontosParaPIN >= 78000) pin = { nome: "Diamond Expert", fixo: 12000, cor: "#f9b233" };
        else if (pontosParaPIN >= 50000) pin = { nome: "Diamond", fixo: 5000, cor: "#3498db" };
        else if (pontosParaPIN >= 28000) pin = { nome: "Professional", fixo: 2500, cor: "#9b59b6" };
        else if (pontosParaPIN >= 12000) pin = { nome: "Expert", fixo: 1250, cor: "#e67e22" };
        else if (pontosParaPIN >= 5000) pin = { nome: "Senior", fixo: 500, cor: "#27ae60" };
        else if (pontosParaPIN >= 2000) pin = { nome: "Start", fixo: 150, cor: "#7f8c8d" };

        let unilevel = volumeMensal * 0.05;
        let totalMensal = unilevel + pin.fixo;

        labels.push(mes + "º Mês");
        dadosGanhos.push(totalMensal);

        let cicloTexto = isFechamento ? `<span class="acelerador-info">FECHAMENTO CICLO (3D Ativo)</span>` : `<span>Início de Ciclo</span>`;

        html += `
            <tr>
                <td>${mes}º Mês<br>${cicloTexto}</td>
                <td>${totalPessoas}</td>
                <td><span class="rank-badge" style="background:${pin.cor}">${pin.nome}</span></td>
                <td>R$ ${volumeMensal.toLocaleString('pt-BR')}</td>
                <td>${Math.floor(pontosParaPIN).toLocaleString('pt-BR')}</td>
                <td>R$ ${pin.fixo.toLocaleString('pt-BR')}</td>
                <td style="color:var(--primary); font-weight:bold">R$ ${totalMensal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            </tr>
        `;
    }

    corpo.innerHTML = html;
    renderizarGrafico(labels, dadosGanhos);
}

function renderizarGrafico(labels, dados) {
    const ctx = document.getElementById('graficoGanhos').getContext('2d');
    if (meuGrafico) meuGrafico.destroy();
    meuGrafico = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Renda Mensal (Unilevel + PIN Fixo)',
                data: dados,
                backgroundColor: '#00a859',
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}
executarSimulacao();
</script>
</body>
</html>
