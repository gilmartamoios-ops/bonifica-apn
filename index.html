<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Bonífica | Simulação Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ff88; --dark: #080808; --card: #121212;
            --gold: #ffcc00; --text: #ffffff; --danger: #ff3366;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 900; font-size: 2rem; color: var(--gold); margin: 0; text-transform: uppercase; }
        .header p { opacity: 0.7; letter-spacing: 2px; font-size: 0.8rem; }

        .config-panel {
            max-width: 900px; margin: 0 auto 40px; background: var(--card);
            padding: 25px; border-radius: 20px; border: 1px solid #222;
            display: flex; gap: 40px; justify-content: center; align-items: center;
        }
        .config-group { text-align: center; }
        .config-group label { display: block; font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; }
        .config-group input { 
            background: #000; border: 1px solid var(--gold); padding: 12px; border-radius: 12px;
            font-size: 24px; font-weight: 900; color: var(--primary); width: 140px; text-align: center; outline: none;
        }

        .career-path { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .level-card {
            background: var(--card); border-radius: 25px; padding: 30px;
            display: grid; grid-template-columns: 180px 1fr 280px;
            align-items: center; gap: 20px; border: 1px solid #222;
            transition: 0.3s; position: relative;
        }

        .rank-info { text-align: center; border-right: 1px solid #333; }
        .rank-info .month { font-size: 48px; font-weight: 900; color: #fff; display: block; }
        .rank-title { 
            color: #000; padding: 8px 12px; border-radius: 6px;
            font-size: 10px; font-weight: 900; display: inline-block; margin-top: 10px;
            width: 175px; text-transform: uppercase;
        }

        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 10px; font-weight: 700; color: #777; text-transform: uppercase; }
        .data-value { font-size: 14px; font-weight: 700; color: #eee; }
        
        .bonus-highlight { color: var(--gold) !important; font-size: 16px; font-weight: 900; }
        .unilevel-highlight { color: #fff !important; font-size: 16px; font-weight: 900; }

        .income-result { 
            background: #000; padding: 20px; border-radius: 20px; text-align: center;
            border: 1px solid #333;
        }
        .income-label { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .income-value { font-size: 30px; font-weight: 900; color: var(--primary); display: block; margin-top: 5px; }

        .acelerador-badge {
            position: absolute; top: 0; right: 40px; background: var(--danger); color: #fff;
            font-size: 9px; font-weight: 900; padding: 5px 15px; border-radius: 0 0 10px 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Sociedade de Consumo e Renda Bonífica</h1>
    <p>TABELA DE GANHOS MENSAL • VALORES EM DINHEIRO • PIN FIXO CORRIGIDO</p>
</div>

<div class="config-panel">
    <div class="config-group">
        <label>Parceiros/Mês</label>
        <input type="number" id="inp_n" value="5" oninput="run()">
    </div>
    <div class="config-group">
        <label>Consumo Médio (R$)</label>
        <input type="number" id="inp_v" value="300" oninput="run()">
    </div>
</div>

<div class="career-path" id="dashboard"></div>

<script>
function run() {
    const n = parseInt(document.getElementById('inp_n').value) || 0;
    const v = parseFloat(document.getElementById('inp_v').value) || 0;
    const container = document.getElementById('dashboard');
    
    let html = '';
    let redeTotal = 0;

    // TABELA DE PIN FIXO (BÔNUS BONÍFICA) - VALORES CORRIGIDOS PELO USUÁRIO
    const ranks = [
        { min: 0, nome: "Consultor", pin: 0, vme: 1.0, cor: "#7f8c8d" },
        { min: 2000, nome: "Empreendedor", pin: 100, vme: 0.50, cor: "#00E5FF" },
        { min: 5000, nome: "Sênior", pin: 200, vme: 0.50, cor: "#00FF41" },
        { min: 12000, nome: "Expert", pin: 700, vme: 0.40, cor: "#FFD700" },
        { min: 28000, nome: "Enterprise", pin: 1300, vme: 0.40, cor: "#FF00FF" },
        { min: 50000, nome: "Diamond", pin: 4000, vme: 0.40, cor: "#3D5AFE" },
        { min: 78000, nome: "Diamond Expert", pin: 12000, vme: 0.40, cor: "#FF9100" },
        { min: 122500, nome: "Diamond Global", pin: 24000, vme: 0.40, cor: "#1DE9B6" },
        { min: 250000, nome: "Empresarial Diamond", pin: 34000, vme: 0.35, cor: "#F44336" },
        { min: 500000, nome: "Imperial Bonific", pin: 60000, vme: 0.30, cor: "#FFEB3B" },
        { min: 1000000, nome: "Majestic Bonific", pin: 130000, vme: 0.30, cor: "#ffffff" },
        { min: 2000000, nome: "Empresarial", pin: 250000, vme: 0.30, cor: "#ff3366" }
    ];

    for (let mes = 1; mes <= 12; mes++) {
        redeTotal += Math.pow(n, mes);
        let volTotalBRL = redeTotal * v;
        let ptsOrg = volTotalBRL / 3;
        
        let is3D = (mes % 2 === 0 && ptsOrg < 50000);
        let ptsCarreira = is3D ? ptsOrg * 1.5 : ptsOrg;

        // BÔNUS UNILEVEL (5%, 5%, 9%, 4%) CALCULADO SOBRE VOLUME R$
        let unilevelBRL = 0;
        for (let g = 1; g <= mes; g++) {
            let volGen = Math.pow(n, g) * v;
            let p = 0.04; 
            if(g === 1 || g === 2) p = 0.05;
            if(g === 3) p = 0.09;
            unilevelBRL += volGen * p;
        }

        let ptsPorLinha = ptsCarreira / n;
        let rankAtivo = ranks[0];
        for (let r of ranks) {
            let ptsValidos = n * Math.min(ptsPorLinha, r.min * r.vme);
            if (ptsValidos >= r.min) rankAtivo = r;
        }

        let rendaFinal = unilevelBRL + rankAtivo.pin;

        html += `
            <div class="level-card">
                ${is3D ? '<div class="acelerador-badge">ACELERADOR 3D ATIVO</div>' : ''}
                <div class="rank-info">
                    <span class="month">${mes}º MÊS</span>
                    <span class="rank-title" style="background:${rankAtivo.cor}">${rankAtivo.nome}</span>
                </div>
                <div class="data-grid">
                    <div class="data-item"><span class="data-label">Rede</span><span class="data-value">${redeTotal.toLocaleString()} Parceiros</span></div>
                    <div class="data-item"><span class="data-label">Volume de Pontos</span><span class="data-value">${Math.floor(ptsCarreira).toLocaleString()} pts</span></div>
                    <div class="data-item"><span class="data-label">Unilevel (Residual)</span><span class="data-value unilevel-highlight">R$ ${unilevelBRL.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                    <div class="data-item"><span class="data-label">Bônus PIN Fixo</span><span class="data-value bonus-highlight">R$ ${rankAtivo.pin.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
                </div>
                <div class="income-result">
                    <span class="income-label">RENDA TOTAL ESTIMADA</span>
                    <span class="income-value">R$ ${rendaFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            </div>`;
    }
    container.innerHTML = html;
}
run();
</script>
</body>
</html>
